name: Build Linux

on:
  workflow_dispatch:
  workflow_call:

jobs:
  linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          set -a; source config/versions.env; set +a
          echo "MPV_BUILD_REPO=$MPV_BUILD_REPO" >> "$GITHUB_ENV"
          echo "MPV_BUILD_REF=$MPV_BUILD_REF" >> "$GITHUB_ENV"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake meson ninja-build nasm yasm \
            pkg-config autoconf automake libtool \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libxext-dev libxfixes-dev libxss-dev libxpresent-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdrm-dev libgbm-dev libvulkan-dev \
            libasound2-dev libpulse-dev libjack-dev libpipewire-0.3-dev \
            libfreetype-dev libfontconfig1-dev libfribidi-dev \
            libharfbuzz-dev \
            libssl-dev \
            libluajit-5.1-dev \
            libvdpau-dev libva-dev \
            python3 python3-pip python3-jinja2 python3-docutils

      - name: Clone mpv-build
        run: |
          git clone --depth 1 "https://github.com/${MPV_BUILD_REPO}.git" mpv-build

      - name: Configure build options
        working-directory: mpv-build
        run: |
          # ffmpeg: build shared libraries
          cat > ffmpeg_options <<'EOF'
          --enable-shared
          --disable-static
          --enable-gpl
          --enable-version3
          --enable-nonfree
          --enable-openssl
          --disable-programs
          --disable-doc
          EOF

          # mpv: build libmpv, no player binary
          cat > mpv_options <<'EOF'
          -Dlibmpv=true
          -Dcplayer=false
          -Dbuild-date=false
          -Dmanpage-build=disabled
          EOF

      - name: Build
        working-directory: mpv-build
        run: |
          ./rebuild -j$(nproc)

      - name: Collect and package
        run: |
          set -euo pipefail
          mkdir -p package/lib package/include/mpv

          BUILD_PREFIX="mpv-build/build_libs"
          MPV_BUILD_DIR="mpv-build/mpv/build"

          # ── libmpv ──
          find "$MPV_BUILD_DIR" -name 'libmpv.so*' -exec cp -a {} package/lib/ \;

          # If mpv-build installs to build_libs:
          if [ -d "$BUILD_PREFIX/lib" ]; then
            find "$BUILD_PREFIX/lib" -name 'libmpv*' -exec cp -a {} package/lib/ \;
            find "$BUILD_PREFIX/lib" -name 'libav*' -exec cp -a {} package/lib/ \;
            find "$BUILD_PREFIX/lib" -name 'libsw*' -exec cp -a {} package/lib/ \;
            find "$BUILD_PREFIX/lib" -name 'libass*' -exec cp -a {} package/lib/ \;
            find "$BUILD_PREFIX/lib" -name 'libplacebo*' -exec cp -a {} package/lib/ \;
            find "$BUILD_PREFIX/lib" -name 'libpostproc*' -exec cp -a {} package/lib/ \;
          fi

          # Also check /usr/local where mpv-build might install
          if [ -f "/usr/local/lib/libmpv.so" ]; then
            cp -a /usr/local/lib/libmpv* package/lib/
          fi

          # ── ffmpeg shared libs ──
          FFMPEG_BUILD="mpv-build/ffmpeg_build"
          if [ -d "$FFMPEG_BUILD/lib" ]; then
            find "$FFMPEG_BUILD/lib" -name '*.so*' -exec cp -a {} package/lib/ \;
          fi

          # ── Headers ──
          for loc in "$BUILD_PREFIX/include/mpv" \
                     "/usr/local/include/mpv" \
                     "$MPV_BUILD_DIR/../libmpv" \
                     "mpv-build/mpv/libmpv"; do
            if [ -d "$loc" ]; then
              find "$loc" -name '*.h' -exec cp {} package/include/mpv/ \;
            fi
          done

          # ── Validate ──
          echo "=== Libraries ==="
          ls -lh package/lib/

          if [ ! -f "package/lib/libmpv.so" ] && ! ls package/lib/libmpv.so* 1>/dev/null 2>&1; then
            echo "FATAL: libmpv.so not found!"
            find mpv-build -name 'libmpv*' -type f 2>/dev/null
            exit 1
          fi

          for hdr in client.h render.h render_gl.h; do
            if [ ! -f "package/include/mpv/$hdr" ]; then
              echo "FATAL: Missing header: $hdr"
              exit 1
            fi
          done

          file package/lib/libmpv.so* | head -3

          # ── Add NOTICE ──
          cp NOTICE.md package/ 2>/dev/null || true

          # ── Create tarball ──
          cd package
          find . -print0 | sort -z | \
            tar --create --null --files-from=- \
                --owner=0 --group=0 --mtime='2024-01-01 00:00:00Z' \
                --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            | gzip -9n > "../libmpv-linux-x86_64.tar.gz"

          ls -lh "../libmpv-linux-x86_64.tar.gz"
          sha256sum "../libmpv-linux-x86_64.tar.gz"
          tar -tzf "../libmpv-linux-x86_64.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: libmpv-linux-x86_64
          path: libmpv-linux-x86_64.tar.gz
          retention-days: 5
          if-no-files-found: error
