name: Build Linux

on:
  workflow_dispatch:
  workflow_call:

jobs:
  linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          set -a; source config/versions.env; set +a
          echo "MPV_BUILD_REPO=$MPV_BUILD_REPO" >> "$GITHUB_ENV"
          echo "MPV_BUILD_REF=$MPV_BUILD_REF" >> "$GITHUB_ENV"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost
          df -h /

      - name: Install modern meson and ninja via pip
        run: |
          sudo apt-get remove -y meson ninja-build 2>/dev/null || true
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade meson ninja
          echo "meson: $(meson --version)"
          echo "ninja: $(ninja --version)"

      # ──────────────────────────────────────────────────────
      # FIX: Remove libvulkan-dev from the install list.
      #
      # The Vulkan header mismatch:
      #   - libplacebo bundles Vulkan-Headers 1.4.x (via submodule)
      #   - ffmpeg's hwcontext_vulkan.h uses VkVideoCodecOperationFlagBitsKHR
      #     (requires Vulkan SDK >= 1.3.277)
      #   - Ubuntu 22.04 libvulkan-dev has older headers (~1.3.204)
      #   - When mpv compiles: includes libplacebo → ffmpeg vulkan header
      #     → references a type that doesn't exist in the old system headers
      #
      # Since we build libmpv for OpenGL FBO rendering (not Vulkan),
      # we don't need Vulkan at all. Removing libvulkan-dev prevents
      # ffmpeg/libplacebo from detecting it, cleanly avoiding the issue.
      # ──────────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake nasm yasm \
            pkg-config autoconf automake libtool \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libxext-dev libxfixes-dev libxss-dev libxpresent-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdrm-dev libgbm-dev \
            libasound2-dev libpulse-dev libjack-dev libpipewire-0.3-dev \
            libfreetype-dev libfontconfig1-dev libfribidi-dev \
            libharfbuzz-dev \
            libssl-dev \
            libluajit-5.1-dev \
            libvdpau-dev libva-dev \
            libarchive-dev \
            libbluray-dev libdvdnav-dev \
            python3 python3-pip python3-jinja2 python3-docutils

          # Explicitly remove vulkan headers if somehow present
          sudo apt-get remove -y libvulkan-dev 2>/dev/null || true

          # NOTE: NO libvulkan-dev — avoids Vulkan header version mismatch
          # NOTE: NO meson or ninja-build from apt — we use pip versions

      - name: Verify tool versions
        run: |
          echo "=== Tool versions ==="
          echo "meson: $(meson --version) at $(which meson)"
          echo "ninja: $(ninja --version) at $(which ninja)"
          echo "gcc:   $(gcc --version | head -1)"
          echo "nasm:  $(nasm --version)"
          # Confirm no vulkan headers
          echo ""
          echo "=== Vulkan check ==="
          pkg-config --modversion vulkan 2>/dev/null && echo "WARNING: vulkan found!" || echo "OK: vulkan not found (expected)"

      - name: Clone mpv-build
        run: |
          git clone --depth 1 "https://github.com/${MPV_BUILD_REPO}.git" mpv-build

      # ──────────────────────────────────────────────────────
      # Create ffmpeg_options to explicitly disable Vulkan.
      # This is a belt-and-suspenders approach: even if somehow
      # vulkan headers are found, ffmpeg won't try to use them.
      #
      # We do NOT use --enable-shared / --disable-static here.
      # mpv-build's default behavior statically links ffmpeg
      # into libmpv.so, which is what we want.
      # ──────────────────────────────────────────────────────
      - name: Configure build options
        working-directory: mpv-build
        run: |
          # ffmpeg: disable vulkan, keep everything else default (static)
          cat > ffmpeg_options <<'EOF'
          --disable-vulkan
          EOF

          # mpv: build shared libmpv, no player binary
          cat > mpv_options <<'EOF'
          -Dlibmpv=true
          -Dbuild-date=false
          EOF

          echo "=== ffmpeg_options ==="
          cat ffmpeg_options
          echo ""
          echo "=== mpv_options ==="
          cat mpv_options

      - name: Build
        working-directory: mpv-build
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "Using meson: $(which meson) ($(meson --version))"
          echo "Using ninja: $(which ninja) ($(ninja --version))"
          ./rebuild -j$(nproc)

      - name: Collect and package
        run: |
          set -euo pipefail
          mkdir -p package/lib package/include/mpv

          echo "=== Searching for libmpv.so ==="
          find mpv-build -name 'libmpv*.so*' -type f 2>/dev/null | sort

          # Search all possible locations
          for search_dir in \
            "mpv-build/mpv/build" \
            "mpv-build/build_libs/lib" \
            "mpv-build/build_libs/lib64"; do
            if [ -d "$search_dir" ]; then
              find "$search_dir" -name 'libmpv*.so*' -type f -exec cp -a {} package/lib/ \; 2>/dev/null || true
            fi
          done

          # Check /usr/local
          if ! ls package/lib/libmpv.so* 1>/dev/null 2>&1; then
            for usrdir in /usr/local/lib /usr/local/lib/x86_64-linux-gnu; do
              if ls "$usrdir"/libmpv.so* 1>/dev/null 2>&1; then
                cp -a "$usrdir"/libmpv*.so* package/lib/
              fi
            done
          fi

          # ── Create proper symlinks ──
          cd package/lib

          REAL_FILE=$(ls libmpv.so.*.*.* 2>/dev/null | head -1)
          if [ -n "$REAL_FILE" ]; then
            BASENAME=$(basename "$REAL_FILE")
            MAJOR=$(echo "$BASENAME" | sed 's/libmpv\.so\.\([0-9]*\)\..*/\1/')
            ln -sf "$BASENAME" "libmpv.so.${MAJOR}" 2>/dev/null || true
            ln -sf "libmpv.so.${MAJOR}" "libmpv.so" 2>/dev/null || true
            echo "Symlinks: libmpv.so -> libmpv.so.${MAJOR} -> ${BASENAME}"
          fi

          cd ../..

          # ── Headers ──
          for search_dir in \
            "mpv-build/mpv/libmpv" \
            "mpv-build/mpv/build/libmpv" \
            "mpv-build/build_libs/include/mpv" \
            "/usr/local/include/mpv"; do
            if [ -d "$search_dir" ]; then
              for hdr in client.h render.h render_gl.h stream_cb.h; do
                [ -f "$search_dir/$hdr" ] && cp "$search_dir/$hdr" package/include/mpv/
              done
            fi
          done

          if [ ! -f "package/include/mpv/client.h" ]; then
            echo "WARNING: Downloading headers from mpv repo..."
            for hdr in client.h render.h render_gl.h stream_cb.h; do
              curl -sL "https://raw.githubusercontent.com/mpv-player/mpv/master/libmpv/${hdr}" \
                -o "package/include/mpv/${hdr}" || true
            done
          fi

          # ── Validate ──
          echo ""
          echo "=== Validation ==="

          if ! ls package/lib/libmpv.so* 1>/dev/null 2>&1; then
            echo "FATAL: libmpv.so not found!"
            find mpv-build -name 'libmpv*' -type f 2>/dev/null
            ls -la /usr/local/lib/libmpv* 2>/dev/null || true
            exit 1
          fi

          for hdr in client.h render.h render_gl.h; do
            if [ ! -f "package/include/mpv/$hdr" ]; then
              echo "FATAL: Missing header: $hdr"
              exit 1
            fi
          done

          echo "Architecture:"
          file package/lib/libmpv.so* | head -3

          echo ""
          echo "Exported mpv symbols:"
          if [ -f "package/lib/libmpv.so" ]; then
            nm -D package/lib/libmpv.so 2>/dev/null | grep ' T mpv_' | head -10
          fi

          echo ""
          echo "Dependencies (NEEDED):"
          if [ -f "package/lib/libmpv.so" ]; then
            readelf -d package/lib/libmpv.so | grep NEEDED || true
          fi

          # Confirm no vulkan dependency
          echo ""
          echo "Vulkan check:"
          if readelf -d package/lib/libmpv.so 2>/dev/null | grep -qi vulkan; then
            echo "WARNING: libmpv has vulkan dependency (unexpected)"
          else
            echo "OK: no vulkan dependency"
          fi

          echo ""
          echo "=== Libraries ==="
          ls -lh package/lib/

          echo ""
          echo "=== Headers ==="
          ls -lh package/include/mpv/

          cp NOTICE.md package/ 2>/dev/null || true

          cd package
          find . -print0 | sort -z | \
            tar --create --null --files-from=- \
                --owner=0 --group=0 --mtime='2024-01-01 00:00:00Z' \
                --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            | gzip -9n > "../libmpv-linux-x86_64.tar.gz"

          echo ""
          echo "=== Final archive ==="
          ls -lh "../libmpv-linux-x86_64.tar.gz"
          sha256sum "../libmpv-linux-x86_64.tar.gz"
          echo ""
          tar -tzf "../libmpv-linux-x86_64.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: libmpv-linux-x86_64
          path: libmpv-linux-x86_64.tar.gz
          retention-days: 5
          if-no-files-found: error