name: Build Linux

on:
  workflow_dispatch:
  workflow_call:

jobs:
  linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          set -a; source config/versions.env; set +a
          echo "MPV_BUILD_REPO=$MPV_BUILD_REPO" >> "$GITHUB_ENV"
          echo "MPV_BUILD_REF=$MPV_BUILD_REF" >> "$GITHUB_ENV"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake meson ninja-build nasm yasm \
            pkg-config autoconf automake libtool \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libxext-dev libxfixes-dev libxss-dev libxpresent-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdrm-dev libgbm-dev libvulkan-dev \
            libasound2-dev libpulse-dev libjack-dev libpipewire-0.3-dev \
            libfreetype-dev libfontconfig1-dev libfribidi-dev \
            libharfbuzz-dev \
            libssl-dev \
            libluajit-5.1-dev \
            libvdpau-dev libva-dev \
            libplacebo-dev \
            libarchive-dev \
            libbluray-dev libdvdnav-dev \
            python3 python3-pip python3-jinja2 python3-docutils

      - name: Clone mpv-build
        run: |
          git clone --depth 1 "https://github.com/${MPV_BUILD_REPO}.git" mpv-build

      # ──────────────────────────────────────────────────────
      # FIX BUG #2: Do NOT create ffmpeg_options with --enable-shared.
      # mpv-build's DEFAULT behavior statically links ffmpeg, libass,
      # and libplacebo INTO libmpv.so. This is exactly what we want
      # for distribution — a single self-contained libmpv.so.
      #
      # Creating ffmpeg_options with --enable-shared would:
      #   1. Fight the default static linking
      #   2. Produce separate libav*.so files that need to be shipped
      #   3. Potentially cause linker failures
      # ──────────────────────────────────────────────────────
      - name: Configure build options
        working-directory: mpv-build
        run: |
          # mpv options: build shared libmpv, skip the player binary
          cat > mpv_options <<'EOF'
          -Dlibmpv=true
          -Dbuild-date=false
          EOF

          # Do NOT create ffmpeg_options — let mpv-build use defaults.
          # This statically links ffmpeg into libmpv.so.

          echo "=== mpv_options ==="
          cat mpv_options
          echo ""
          echo "=== ffmpeg_options ==="
          echo "(not created — using mpv-build defaults for static linking)"

      # ./rebuild does: ./update (clone/pull repos) → ./clean → ./build
      - name: Build
        working-directory: mpv-build
        run: |
          ./rebuild -j$(nproc)

      # ──────────────────────────────────────────────────────
      # FIX BUG #3: Only collect libmpv.so — ffmpeg/libass/libplacebo
      # are statically linked inside it. There are no separate .so files.
      # ──────────────────────────────────────────────────────
      - name: Collect and package
        run: |
          set -euo pipefail
          mkdir -p package/lib package/include/mpv

          # ── Find libmpv.so ──
          # mpv-build puts the output in mpv/build/ directory
          MPV_BUILD_DIR="mpv-build/mpv/build"

          echo "=== Searching for libmpv.so ==="
          find mpv-build -name 'libmpv*.so*' -type f 2>/dev/null | sort

          # Copy from mpv build directory
          if [ -d "$MPV_BUILD_DIR" ]; then
            find "$MPV_BUILD_DIR" -name 'libmpv*.so*' -type f -exec cp -a {} package/lib/ \;
          fi

          # Also check build_libs (some mpv-build versions install here)
          if [ -d "mpv-build/build_libs/lib" ]; then
            find "mpv-build/build_libs/lib" -name 'libmpv*.so*' -exec cp -a {} package/lib/ \;
          fi

          # Also check /usr/local (./rebuild might install system-wide)
          if [ -f "/usr/local/lib/libmpv.so" ] || ls /usr/local/lib/libmpv.so* 1>/dev/null 2>&1; then
            cp -a /usr/local/lib/libmpv*.so* package/lib/
          fi

          # ── Create proper symlinks ──
          cd package/lib

          # Find the real file (e.g., libmpv.so.2.3.0)
          REAL_FILE=$(ls libmpv.so.*.*.* 2>/dev/null | head -1)
          if [ -n "$REAL_FILE" ]; then
            BASENAME=$(basename "$REAL_FILE")
            MAJOR=$(echo "$BASENAME" | sed 's/libmpv\.so\.\([0-9]*\)\..*/\1/')

            # Create soname symlink: libmpv.so.2 -> libmpv.so.2.3.0
            ln -sf "$BASENAME" "libmpv.so.${MAJOR}" 2>/dev/null || true

            # Create dev symlink: libmpv.so -> libmpv.so.2
            ln -sf "libmpv.so.${MAJOR}" "libmpv.so" 2>/dev/null || true

            echo "Symlinks: libmpv.so -> libmpv.so.${MAJOR} -> ${BASENAME}"
          elif [ -f "libmpv.so" ]; then
            echo "Found libmpv.so directly (no versioned name)"
          fi

          cd ../..

          # ── Headers ──
          # mpv source tree: libmpv/ or include/mpv/
          for search_dir in \
            "mpv-build/mpv/libmpv" \
            "mpv-build/mpv/build/libmpv" \
            "mpv-build/build_libs/include/mpv" \
            "/usr/local/include/mpv"; do
            if [ -d "$search_dir" ]; then
              for hdr in client.h render.h render_gl.h stream_cb.h; do
                [ -f "$search_dir/$hdr" ] && cp "$search_dir/$hdr" package/include/mpv/
              done
            fi
          done

          # Last resort
          if [ ! -f "package/include/mpv/client.h" ]; then
            echo "WARNING: Downloading headers from mpv repo..."
            for hdr in client.h render.h render_gl.h stream_cb.h; do
              curl -sL "https://raw.githubusercontent.com/mpv-player/mpv/master/libmpv/${hdr}" \
                -o "package/include/mpv/${hdr}" || true
            done
          fi

          # ── Validate ──
          echo ""
          echo "=== Validation ==="

          if ! ls package/lib/libmpv.so* 1>/dev/null 2>&1; then
            echo "FATAL: libmpv.so not found!"
            echo ""
            echo "=== Full search of mpv-build ==="
            find mpv-build -name 'libmpv*' -type f 2>/dev/null
            echo ""
            echo "=== /usr/local/lib ==="
            ls /usr/local/lib/libmpv* 2>/dev/null || echo "(nothing)"
            exit 1
          fi

          for hdr in client.h render.h render_gl.h; do
            if [ ! -f "package/include/mpv/$hdr" ]; then
              echo "FATAL: Missing header: $hdr"
              exit 1
            fi
          done

          echo "Architecture:"
          file package/lib/libmpv.so* | head -3

          echo ""
          echo "Exported mpv symbols:"
          if [ -f "package/lib/libmpv.so" ]; then
            nm -D package/lib/libmpv.so 2>/dev/null | grep ' T mpv_' | head -10
          fi

          echo ""
          echo "Dependencies:"
          if [ -f "package/lib/libmpv.so" ]; then
            readelf -d package/lib/libmpv.so | grep NEEDED || true
          fi

          echo ""
          echo "=== Libraries ==="
          ls -lh package/lib/

          echo ""
          echo "=== Headers ==="
          ls -lh package/include/mpv/

          # ── Add NOTICE ──
          cp NOTICE.md package/ 2>/dev/null || true

          # ── Create deterministic tarball ──
          cd package
          find . -print0 | sort -z | \
            tar --create --null --files-from=- \
                --owner=0 --group=0 --mtime='2024-01-01 00:00:00Z' \
                --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            | gzip -9n > "../libmpv-linux-x86_64.tar.gz"

          echo ""
          echo "=== Final archive ==="
          ls -lh "../libmpv-linux-x86_64.tar.gz"
          sha256sum "../libmpv-linux-x86_64.tar.gz"
          echo ""
          tar -tzf "../libmpv-linux-x86_64.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: libmpv-linux-x86_64
          path: libmpv-linux-x86_64.tar.gz
          retention-days: 5
          if-no-files-found: error