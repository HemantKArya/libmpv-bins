name: Build Android

on:
  workflow_dispatch:
  workflow_call:

jobs:
  android:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            abi: arm64-v8a
          - arch: armv7l
            abi: armeabi-v7a
          - arch: x86_64
            abi: x86_64
          - arch: x86
            abi: x86

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          set -euo pipefail
          set -a
          source config/versions.env
          set +a

          # Validate required variables
          : "${MPV_ANDROID_REPO:?MPV_ANDROID_REPO not set in versions.env}"
          : "${MPV_ANDROID_REF:?MPV_ANDROID_REF not set in versions.env}"
          : "${RELEASE_VERSION:?RELEASE_VERSION not set in versions.env}"
          : "${ANDROID_NDK_VERSION:?ANDROID_NDK_VERSION not set in versions.env}"
          : "${ANDROID_NDK_PKG_ID:?ANDROID_NDK_PKG_ID not set in versions.env}"
          : "${ANDROID_STL:?ANDROID_STL not set in versions.env}"

          echo "MPV_ANDROID_REPO=$MPV_ANDROID_REPO"       >> "$GITHUB_ENV"
          echo "MPV_ANDROID_REF=$MPV_ANDROID_REF"         >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION"         >> "$GITHUB_ENV"
          echo "ANDROID_NDK_VERSION=$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_PKG_ID=$ANDROID_NDK_PKG_ID"   >> "$GITHUB_ENV"
          echo "ANDROID_STL=$ANDROID_STL"                 >> "$GITHUB_ENV"

          echo "──────────────────────────────────────"
          echo "Loaded NDK: ${ANDROID_NDK_VERSION} (pkg ${ANDROID_NDK_PKG_ID})"
          echo "STL: ${ANDROID_STL}"
          echo "──────────────────────────────────────"

      - name: Free disk space
        run: |
          set -euo pipefail
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache /usr/local/share/boost \
            /usr/local/graalvm /usr/local/.ghcup
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java version
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      # ──────────────────────────────────────────────────────
      # FIX: fontconfig now requires meson >= 1.6.1.
      # Ubuntu 22.04 ships meson 0.61.2.
      # ──────────────────────────────────────────────────────
      - name: Install modern meson and ninja via pip
        run: |
          set -euo pipefail
          sudo apt-get remove -y meson ninja-build 2>/dev/null || true
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade meson ninja
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "meson: $(meson --version)"
          echo "ninja: $(ninja --version)"

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config \
            python3 python3-pip python3-setuptools python3-jsonschema \
            nasm wget unzip git

      - name: Clone mpv-android
        run: |
          set -euo pipefail
          git clone --depth 1 --recurse-submodules --branch "$MPV_ANDROID_REF" \
            "https://github.com/${MPV_ANDROID_REPO}.git" mpv-android

      # ══════════════════════════════════════════════════════
      # CRITICAL: Patch depinfo.sh to override the NDK version
      #
      # mpv-android's include/depinfo.sh defines its own ndkver
      # (currently r29 on master). We MUST patch this to match
      # our versions.env BEFORE download.sh runs, because
      # download.sh reads depinfo.sh to decide which NDK to
      # install via sdkmanager.
      #
      # This is the ONLY reliable way to force a specific NDK.
      # ══════════════════════════════════════════════════════
      - name: Patch depinfo.sh — override NDK to ${{ env.ANDROID_NDK_VERSION }}
        working-directory: mpv-android/buildscripts
        run: |
          set -euo pipefail

          DEPINFO="include/depinfo.sh"
          if [ ! -f "$DEPINFO" ]; then
            echo "FATAL: $DEPINFO not found!"
            echo "Directory contents:"
            find include/ -type f 2>/dev/null || echo "(include/ missing)"
            exit 1
          fi

          echo "=== Original depinfo.sh NDK config ==="
          grep -n "ndkver\|ndk_ver\|NDK_VERSION\|ndk;" "$DEPINFO" || echo "(no ndkver found)"

          # ── Detect the variable name used for NDK version ──
          # Different mpv-android versions may use different variable names
          if grep -q "^ndkver=" "$DEPINFO"; then
            NDK_VAR="ndkver"
          elif grep -q "^ndk_ver=" "$DEPINFO"; then
            NDK_VAR="ndk_ver"
          elif grep -q "^v_ndk=" "$DEPINFO"; then
            NDK_VAR="v_ndk"
          else
            echo ""
            echo "WARNING: Could not find NDK version variable in $DEPINFO"
            echo "Full file contents:"
            cat "$DEPINFO"
            echo ""
            echo "Attempting to add ndkver variable..."
            # If no NDK variable exists, the script might use sdkmanager directly
            # We'll add it and also handle the download-sdk.sh path below
            NDK_VAR="ndkver"
          fi

          # ── Patch the NDK version ──
          ORIGINAL_VER=$(grep "^${NDK_VAR}=" "$DEPINFO" | head -1 | cut -d= -f2)
          echo ""
          echo "NDK variable  : ${NDK_VAR}"
          echo "Original value: ${ORIGINAL_VER:-'(not set)'}"
          echo "New value     : ${ANDROID_NDK_VERSION}"

          if [ -n "$ORIGINAL_VER" ]; then
            sed -i "s/^${NDK_VAR}=.*/${NDK_VAR}=${ANDROID_NDK_VERSION}/" "$DEPINFO"
          else
            # Variable didn't exist — prepend it
            sed -i "1i ${NDK_VAR}=${ANDROID_NDK_VERSION}" "$DEPINFO"
          fi

          echo ""
          echo "=== Patched depinfo.sh NDK config ==="
          grep -n "ndkver\|ndk_ver\|NDK_VERSION\|ndk;" "$DEPINFO" || true

          # ── Also check/patch download-sdk.sh if it hardcodes an NDK pkg ID ──
          SDK_SCRIPT="include/download-sdk.sh"
          if [ -f "$SDK_SCRIPT" ]; then
            echo ""
            echo "=== Checking $SDK_SCRIPT for hardcoded NDK ==="
            grep -n "ndk;" "$SDK_SCRIPT" || echo "(no ndk; references found)"

            # If it contains something like sdkmanager "ndk;29.0.13599879"
            # we need to replace with our pkg ID
            if grep -q "ndk;[0-9]" "$SDK_SCRIPT"; then
              echo "Patching hardcoded NDK pkg ID in $SDK_SCRIPT..."
              sed -i "s|ndk;[0-9][0-9]*\.[0-9][0-9]*\.[0-9]*|ndk;${ANDROID_NDK_PKG_ID}|g" "$SDK_SCRIPT"
              echo "Patched:"
              grep -n "ndk;" "$SDK_SCRIPT"
            fi
          fi

          # ── Also check download.sh itself ──
          if [ -f "download.sh" ]; then
            echo ""
            echo "=== Checking download.sh for hardcoded NDK ==="
            grep -n "ndk;" "download.sh" || echo "(no ndk; references in download.sh)"

            if grep -q "ndk;[0-9]" "download.sh"; then
              echo "Patching hardcoded NDK pkg ID in download.sh..."
              sed -i "s|ndk;[0-9][0-9]*\.[0-9][0-9]*\.[0-9]*|ndk;${ANDROID_NDK_PKG_ID}|g" "download.sh"
              echo "Patched:"
              grep -n "ndk;" "download.sh"
            fi
          fi

          echo ""
          echo "✓ NDK version patched to ${ANDROID_NDK_VERSION} (${ANDROID_NDK_PKG_ID})"

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: mpv-android/buildscripts/sdk
          key: android-sdk-ndk-${{ runner.os }}-${{ env.ANDROID_NDK_PKG_ID }}-${{ hashFiles('config/versions.env') }}
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-${{ env.ANDROID_NDK_PKG_ID }}-
            android-sdk-ndk-${{ runner.os }}-

      - name: Download sources and SDK
        working-directory: mpv-android/buildscripts
        run: |
          set -euo pipefail
          echo "Using meson: $(which meson) ($(meson --version))"
          java -version 2>&1 | head -1

          echo ""
          echo "=== NDK version in depinfo.sh before download ==="
          grep "ndkver\|ndk_ver\|v_ndk" include/depinfo.sh || true
          echo ""

          ./download.sh

      # ══════════════════════════════════════════════════════
      # Post-download verification: confirm the ACTUAL NDK
      # installed matches what we requested in versions.env.
      # This catches cases where:
      #   - Our depinfo.sh patch didn't take effect
      #   - download.sh has additional hardcoded NDK logic
      #   - The cache contained a different NDK version
      # ══════════════════════════════════════════════════════
      - name: Verify NDK version matches versions.env
        working-directory: mpv-android/buildscripts
        run: |
          set -euo pipefail

          echo "=== Post-download NDK Verification ==="
          echo ""

          # Find ALL NDKs present in the sdk directory
          echo "NDK directories found in sdk/:"
          find sdk/ -name "source.properties" -path "*/ndk*" 2>/dev/null | while read -r props; do
            rev=$(grep "^Pkg.Revision" "$props" | cut -d= -f2 | tr -d ' ')
            echo "  $props → Pkg.Revision=$rev"
          done

          # Also check android-ndk-* directories
          find sdk/ -maxdepth 1 -name "android-ndk-*" -type d 2>/dev/null | while read -r d; do
            if [ -f "$d/source.properties" ]; then
              rev=$(grep "^Pkg.Revision" "$d/source.properties" | cut -d= -f2 | tr -d ' ')
              echo "  $d → Pkg.Revision=$rev"
            else
              echo "  $d → (no source.properties)"
            fi
          done

          # Check ndk-bundle symlink/directory
          if [ -L "sdk/ndk-bundle" ]; then
            echo "  sdk/ndk-bundle → $(readlink sdk/ndk-bundle)"
          elif [ -d "sdk/ndk-bundle" ]; then
            if [ -f "sdk/ndk-bundle/source.properties" ]; then
              rev=$(grep "^Pkg.Revision" "sdk/ndk-bundle/source.properties" | cut -d= -f2 | tr -d ' ')
              echo "  sdk/ndk-bundle → Pkg.Revision=$rev"
            fi
          fi

          echo ""

          # ── Find the NDK that will actually be used ──
          # The build scripts typically look for ndk-bundle or android-ndk-rXX
          ACTUAL_NDK_DIR=""
          ACTUAL_REV=""

          # Priority 1: android-ndk-{our version}
          if [ -d "sdk/android-ndk-${ANDROID_NDK_VERSION}" ]; then
            ACTUAL_NDK_DIR="sdk/android-ndk-${ANDROID_NDK_VERSION}"
          # Priority 2: ndk-bundle
          elif [ -d "sdk/ndk-bundle" ]; then
            ACTUAL_NDK_DIR="sdk/ndk-bundle"
          # Priority 3: any android-ndk-* directory
          else
            ACTUAL_NDK_DIR=$(find sdk/ -maxdepth 1 -name "android-ndk-*" -type d | head -1)
          fi

          if [ -z "$ACTUAL_NDK_DIR" ]; then
            # Check side-by-side NDK directories
            ACTUAL_NDK_DIR=$(find sdk/ -maxdepth 2 -name "source.properties" -path "*/ndk/*" -exec dirname {} \; | head -1)
          fi

          if [ -z "$ACTUAL_NDK_DIR" ] || [ ! -f "${ACTUAL_NDK_DIR}/source.properties" ]; then
            echo "FATAL: No NDK found in sdk/ after download.sh!"
            echo "SDK directory contents:"
            ls -la sdk/ 2>/dev/null || echo "(sdk/ missing)"
            exit 1
          fi

          ACTUAL_REV=$(grep "^Pkg.Revision" "${ACTUAL_NDK_DIR}/source.properties" | cut -d= -f2 | tr -d ' ')

          echo "Expected NDK : ${ANDROID_NDK_VERSION} (Pkg.Revision=${ANDROID_NDK_PKG_ID})"
          echo "Actual NDK   : ${ACTUAL_NDK_DIR} (Pkg.Revision=${ACTUAL_REV})"
          echo ""

          if [ "$ACTUAL_REV" != "$ANDROID_NDK_PKG_ID" ]; then
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  FATAL: NDK VERSION MISMATCH!                          ║"
            echo "║                                                        ║"
            echo "║  Expected: ${ANDROID_NDK_PKG_ID} (${ANDROID_NDK_VERSION})"
            echo "║  Got     : ${ACTUAL_REV}"
            echo "║                                                        ║"
            echo "║  The depinfo.sh patch did not fully take effect.       ║"
            echo "║  Check if download.sh has additional hardcoded NDK     ║"
            echo "║  references that need patching.                        ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            echo ""
            echo "depinfo.sh contents:"
            cat include/depinfo.sh
            echo ""
            echo "download.sh NDK references:"
            grep -n "ndk" download.sh || true
            exit 1
          fi

          echo "✓ NDK ${ANDROID_NDK_VERSION} (${ANDROID_NDK_PKG_ID}) confirmed!"

          # Export the resolved NDK path for build steps
          NDK_PATH="$(cd "${ACTUAL_NDK_DIR}" && pwd)"
          echo "NDK_PATH=${NDK_PATH}" >> "$GITHUB_ENV"
          echo "NDK_PATH=${NDK_PATH}"

      - name: Build for ${{ matrix.arch }}
        working-directory: mpv-android/buildscripts
        env:
          ANDROID_STL: ${{ env.ANDROID_STL }}
        run: |
          set -euo pipefail
          echo "Using meson: $(which meson) ($(meson --version))"
          echo "Using NDK  : ${NDK_PATH}"

          # Double-check the NDK that the build toolchain will use
          CLANG=$(find "${NDK_PATH}" -name "aarch64-linux-android*-clang" -type f | head -1)
          if [ -n "$CLANG" ]; then
            echo "Clang found: $CLANG"
            "$CLANG" --version 2>&1 | head -2 || true
          fi

          ./buildall.sh --arch ${{ matrix.arch }} --clean mpv

      # ══════════════════════════════════════════════════════
      # Post-build: verify the built libmpv.so links against
      # the correct libc++ (not a newer one)
      # ══════════════════════════════════════════════════════
      - name: Verify built libraries use correct NDK
        run: |
          set -euo pipefail
          echo "=== Post-build library verification ==="

          # Find the built libmpv.so
          LIBMPV=$(find mpv-android/buildscripts -name "libmpv.so" -type f | head -1)
          if [ -z "$LIBMPV" ]; then
            echo "WARNING: libmpv.so not found yet, will check during packaging"
          else
            echo "Found: $LIBMPV"
            echo ""
            echo "Dependencies:"
            readelf -d "$LIBMPV" | grep NEEDED || true
            echo ""
            echo "Checking for problematic symbols..."
            # The symbol that caused the crash — verify it's NOT present
            # (it would only be present if built with NDK >= r28 libc++)
            if nm -D "$LIBMPV" 2>/dev/null | grep -q "__from_chars_floating_point"; then
              echo ""
              echo "WARNING: libmpv.so references __from_chars_floating_point"
              echo "This symbol requires a newer libc++_shared.so (NDK r28+)"
              echo "If your Qt uses an older NDK, this WILL crash at runtime!"
              echo ""
              echo "NDK used for build: ${ANDROID_NDK_VERSION} (${ANDROID_NDK_PKG_ID})"
            else
              echo "✓ No __from_chars_floating_point symbol found — safe for older libc++"
            fi
          fi

      - name: Package
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"
          ABI="${{ matrix.abi }}"
          PREFIX="mpv-android/buildscripts/prefix/${ARCH}"
          DEPS_DIR="mpv-android/buildscripts/deps"
          SDK_DIR="mpv-android/buildscripts/sdk"
          NDK_VER="${ANDROID_NDK_VERSION}"

          case "$ABI" in
            arm64-v8a)
              NDK_TRIPLE="aarch64-linux-android"
              NDK_ABI_DIR="aarch64"
              ;;
            armeabi-v7a)
              NDK_TRIPLE="arm-linux-androideabi"
              NDK_ABI_DIR="arm"
              ;;
            x86_64)
              NDK_TRIPLE="x86_64-linux-android"
              NDK_ABI_DIR="x86_64"
              ;;
            x86)
              NDK_TRIPLE="i686-linux-android"
              NDK_ABI_DIR="i686"
              ;;
            *)
              echo "FATAL: Unsupported ABI: $ABI"
              exit 1
              ;;
          esac

          mkdir -p package/lib package/include/mpv

          # ── Collect .so files ──
          if [ -d "${PREFIX}/lib" ]; then
            find "${PREFIX}/lib" -maxdepth 1 -name '*.so' -exec cp {} package/lib/ \;
          fi

          if [ ! -f "package/lib/libmpv.so" ]; then
            echo "WARNING: libmpv.so not in prefix, searching deps..."
            find "${DEPS_DIR}" -name 'libmpv.so' -type f 2>/dev/null | while read -r f; do
              echo "  Found: $f"
              cp "$f" package/lib/
            done
          fi

          if [ ! -f "package/lib/libavcodec.so" ]; then
            for dep_dir in "${DEPS_DIR}"/*/lib; do
              [ -d "$dep_dir" ] && find "$dep_dir" -maxdepth 1 -name '*.so' -exec cp -n {} package/lib/ \;
            done
          fi

          # ── CRITICAL: Collect libc++_shared.so from the VERIFIED NDK ──
          echo ""
          echo "=== Including libc++_shared.so from NDK ${NDK_VER} ==="

          # Use the verified NDK_PATH from the verification step
          NDK_LIBC_PATHS=(
            "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${NDK_TRIPLE}/libc++_shared.so"
            "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang/*/lib/linux/${NDK_ABI_DIR}/libc++_shared.so"
            # Fallback: search any NDK in sdk/
            "${SDK_DIR}/android-ndk-*/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${NDK_TRIPLE}/libc++_shared.so"
            "${SDK_DIR}/ndk-bundle/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${NDK_TRIPLE}/libc++_shared.so"
            "${SDK_DIR}/ndk/*/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${NDK_TRIPLE}/libc++_shared.so"
          )

          FOUND_LIBC=0
          for pattern in "${NDK_LIBC_PATHS[@]}"; do
            for libc_path in $pattern; do
              if [ -f "$libc_path" ]; then
                echo "  Found libc++_shared.so: $libc_path"
                cp "$libc_path" package/lib/
                FOUND_LIBC=1
                break 2
              fi
            done
          done

          if [ $FOUND_LIBC -eq 0 ]; then
            echo "  FATAL: libc++_shared.so not found!"
            echo "  Searched:"
            for pattern in "${NDK_LIBC_PATHS[@]}"; do
              echo "    - $pattern"
            done
            echo "  All libc++_shared.so in NDK:"
            find "${NDK_PATH}" -name 'libc++_shared.so' -type f 2>/dev/null | head -10 || true
            exit 1
          fi

          # ── Collect headers ──
          if [ -d "${PREFIX}/include/mpv" ]; then
            cp "${PREFIX}/include/mpv"/*.h package/include/mpv/
          fi

          if [ ! -f "package/include/mpv/client.h" ]; then
            echo "WARNING: Headers not in prefix, searching source tree..."
            MPV_INCLUDE=$(find "${DEPS_DIR}" -type d -name "mpv" -path "*/include/mpv" | head -1)
            if [ -n "$MPV_INCLUDE" ]; then
              cp "${MPV_INCLUDE}"/*.h package/include/mpv/
            fi
          fi

          if [ ! -f "package/include/mpv/client.h" ]; then
            echo "WARNING: Downloading headers from mpv repo..."
            for hdr in client.h render.h render_gl.h stream_cb.h; do
              curl -sL "https://raw.githubusercontent.com/mpv-player/mpv/master/libmpv/${hdr}" \
                -o "package/include/mpv/${hdr}" || true
            done
          fi

          # ── Create BUILD_INFO metadata (with VERIFIED info) ──
          mkdir -p package/META-INF
          {
            echo "libmpv-android Build Information"
            echo "================================"
            echo ""
            echo "Build Date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Release Version: $RELEASE_VERSION"
            echo "Target ABI: ${ABI}"
            echo "Target Architecture: ${ARCH}"
            echo ""
            echo "C++ Runtime Configuration (VERIFIED)"
            echo "====================================="
            echo "NDK Version: $ANDROID_NDK_VERSION"
            echo "NDK Pkg.Revision: $ANDROID_NDK_PKG_ID"
            echo "NDK Path: ${NDK_PATH}"
            echo "C++ Standard Library: $ANDROID_STL"
            echo "STL Mode: SHARED (libc++_shared.so included)"
            echo ""
            echo "IMPORTANT: depinfo.sh was patched to enforce NDK ${ANDROID_NDK_VERSION}"
            echo "The NDK version was verified AFTER download.sh and AFTER the build."
            echo ""
            echo "CRITICAL COMPATIBILITY NOTES"
            echo "============================"
            echo "- Built with NDK $ANDROID_NDK_VERSION ($ANDROID_NDK_PKG_ID) using c++_shared"
            echo "- libc++_shared.so MUST be included in your APK"
            echo "- All native libraries in your app should use the SAME NDK version"
            echo "- Mixing libc++ versions causes UnsatisfiedLinkError crashes"
            echo ""
            echo "For Qt/Android Integration"
            echo "=========================="
            echo "- Check your Qt's NDK: look in Qt Creator > Preferences > Android > NDK"
            echo "- Qt 6.5.x typically uses NDK r25b or r26b"
            echo "- Qt 6.8+ typically uses NDK r27c"
            echo "- The NDK used here (${ANDROID_NDK_VERSION}) must match Qt's NDK"
            echo "- If mismatched, you will get __from_chars_floating_point crashes"
          } > package/META-INF/BUILD_INFO.txt

          cat package/META-INF/BUILD_INFO.txt

          # ── Validate ──
          echo ""
          echo "=== Validating package ==="
          if [ ! -f "package/lib/libmpv.so" ]; then
            echo "FATAL: libmpv.so not found!"
            find mpv-android/buildscripts -name 'libmpv*' -type f 2>/dev/null
            exit 1
          fi

          REQUIRED_HEADERS=(client.h render.h render_gl.h)
          for hdr in "${REQUIRED_HEADERS[@]}"; do
            if [ ! -f "package/include/mpv/$hdr" ]; then
              echo "FATAL: Missing required header: $hdr"
              exit 1
            fi
          done

          echo ""
          echo "=== Architecture check ==="
          file package/lib/libmpv.so
          readelf -h package/lib/libmpv.so | grep -E "(Class|Machine)"

          echo ""
          echo "=== All libraries ==="
          ls -lh package/lib/

          echo ""
          echo "=== Headers ==="
          ls -lh package/include/mpv/

          cp NOTICE.md package/ 2>/dev/null || echo "INFO: NOTICE.md not found in repo root, skipping."

          cd package
          find . -print0 | sort -z | \
            tar --create --null --files-from=- \
                --owner=0 --group=0 --mtime='2024-01-01 00:00:00Z' \
                --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            | gzip -9n > "../libmpv-android-${ABI}.tar.gz"

          echo ""
          echo "=== Final archive ==="
          ls -lh "../libmpv-android-${ABI}.tar.gz"
          sha256sum "../libmpv-android-${ABI}.tar.gz"
          echo ""
          tar -tzf "../libmpv-android-${ABI}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: libmpv-android-${{ matrix.abi }}
          path: libmpv-android-${{ matrix.abi }}.tar.gz
          retention-days: 5
          if-no-files-found: error