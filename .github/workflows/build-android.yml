name: Build Android

on:
  workflow_dispatch:
  workflow_call:

jobs:
  android:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            abi: arm64-v8a
          - arch: armv7l
            abi: armeabi-v7a
          - arch: x86_64
            abi: x86_64
          - arch: x86
            abi: x86

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          set -euo pipefail
          set -a
          source config/versions.env
          set +a

          : "${MPV_ANDROID_REPO:?MPV_ANDROID_REPO not set in versions.env}"
          : "${MPV_ANDROID_REF:?MPV_ANDROID_REF not set in versions.env}"
          : "${RELEASE_VERSION:?RELEASE_VERSION not set in versions.env}"
          : "${ANDROID_NDK_VERSION:?ANDROID_NDK_VERSION not set in versions.env}"
          : "${ANDROID_NDK_PKG_ID:?ANDROID_NDK_PKG_ID not set in versions.env}"
          : "${ANDROID_STL:?ANDROID_STL not set in versions.env}"

          echo "MPV_ANDROID_REPO=$MPV_ANDROID_REPO"       >> "$GITHUB_ENV"
          echo "MPV_ANDROID_REF=$MPV_ANDROID_REF"         >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION"         >> "$GITHUB_ENV"
          echo "ANDROID_NDK_VERSION=$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_PKG_ID=$ANDROID_NDK_PKG_ID"   >> "$GITHUB_ENV"
          echo "ANDROID_STL=$ANDROID_STL"                 >> "$GITHUB_ENV"

          echo "──────────────────────────────────────"
          echo "NDK: ${ANDROID_NDK_VERSION} (${ANDROID_NDK_PKG_ID})"
          echo "STL: ${ANDROID_STL}"
          echo "──────────────────────────────────────"

      - name: Free disk space
        run: |
          set -euo pipefail
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache /usr/local/share/boost \
            /usr/local/graalvm /usr/local/.ghcup
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java version
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      # ──────────────────────────────────────────────────────
      # Install modern meson + ninja via pip.
      # NOTE: download.sh may reinstall old apt meson later,
      # so we re-assert pip versions AFTER download.sh too.
      # ──────────────────────────────────────────────────────
      - name: Install modern meson and ninja via pip
        run: |
          set -euo pipefail
          sudo apt-get remove -y meson ninja-build 2>/dev/null || true
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade meson ninja
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "meson: $(meson --version)"
          echo "ninja: $(ninja --version)"
          echo "meson path: $(which meson)"

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config \
            python3 python3-pip python3-setuptools python3-jsonschema \
            nasm wget unzip git
          # NOTE: do NOT install meson or ninja from apt — pip versions are newer

      - name: Clone mpv-android
        run: |
          set -euo pipefail
          git clone --depth 1 --recurse-submodules --branch "$MPV_ANDROID_REF" \
            "https://github.com/${MPV_ANDROID_REPO}.git" mpv-android

      # ══════════════════════════════════════════════════════
      # CRITICAL: Patch depinfo.sh to override NDK version.
      #
      # mpv-android's depinfo.sh defines TWO NDK variables:
      #   v_ndk   = r29              (human label)
      #   v_ndk_n = 29.0.13599879    (numeric pkg ID)
      #
      # download.sh validates against v_ndk_n, so we MUST
      # patch BOTH to match our versions.env.
      # ══════════════════════════════════════════════════════
      - name: Patch depinfo.sh — override NDK to ${{ env.ANDROID_NDK_VERSION }}
        working-directory: mpv-android/buildscripts
        run: |
          set -euo pipefail

          DEPINFO="include/depinfo.sh"
          if [ ! -f "$DEPINFO" ]; then
            echo "FATAL: $DEPINFO not found!"
            find include/ -type f 2>/dev/null || echo "(include/ missing)"
            exit 1
          fi

          echo "=== Original depinfo.sh NDK config ==="
          grep -n "v_ndk\|ndkver\|ndk_ver\|NDK_VERSION" "$DEPINFO" || echo "(no NDK vars found)"
          echo ""

          # ── Patch v_ndk (human label: r27c) ──
          if grep -q "^v_ndk=" "$DEPINFO"; then
            ORIG_VNDK=$(grep "^v_ndk=" "$DEPINFO" | head -1 | cut -d= -f2)
            echo "Patching v_ndk: ${ORIG_VNDK} → ${ANDROID_NDK_VERSION}"
            sed -i "s/^v_ndk=.*/v_ndk=${ANDROID_NDK_VERSION}/" "$DEPINFO"
          elif grep -q "^ndkver=" "$DEPINFO"; then
            ORIG_VNDK=$(grep "^ndkver=" "$DEPINFO" | head -1 | cut -d= -f2)
            echo "Patching ndkver: ${ORIG_VNDK} → ${ANDROID_NDK_VERSION}"
            sed -i "s/^ndkver=.*/ndkver=${ANDROID_NDK_VERSION}/" "$DEPINFO"
          else
            echo "WARNING: No v_ndk or ndkver variable found, adding v_ndk..."
            sed -i "1i v_ndk=${ANDROID_NDK_VERSION}" "$DEPINFO"
          fi

          # ── Patch v_ndk_n (numeric pkg ID: 27.2.12479018) ──
          if grep -q "^v_ndk_n=" "$DEPINFO"; then
            ORIG_VNDK_N=$(grep "^v_ndk_n=" "$DEPINFO" | head -1 | cut -d= -f2)
            echo "Patching v_ndk_n: ${ORIG_VNDK_N} → ${ANDROID_NDK_PKG_ID}"
            sed -i "s/^v_ndk_n=.*/v_ndk_n=${ANDROID_NDK_PKG_ID}/" "$DEPINFO"
          elif grep -q "^ndk_pkg=" "$DEPINFO"; then
            ORIG_VNDK_N=$(grep "^ndk_pkg=" "$DEPINFO" | head -1 | cut -d= -f2)
            echo "Patching ndk_pkg: ${ORIG_VNDK_N} → ${ANDROID_NDK_PKG_ID}"
            sed -i "s/^ndk_pkg=.*/ndk_pkg=${ANDROID_NDK_PKG_ID}/" "$DEPINFO"
          else
            echo "WARNING: No v_ndk_n or ndk_pkg variable found, adding v_ndk_n..."
            # Insert right after v_ndk line
            sed -i "/^v_ndk=/a v_ndk_n=${ANDROID_NDK_PKG_ID}" "$DEPINFO"
          fi

          # ── Also patch any hardcoded ndk;XX.X.XXXXXXXX in download scripts ──
          for script in include/download-sdk.sh download.sh; do
            if [ -f "$script" ] && grep -q "ndk;[0-9]" "$script"; then
              echo ""
              echo "Patching hardcoded NDK pkg ID in $script..."
              grep -n "ndk;[0-9]" "$script"
              sed -i "s|ndk;[0-9][0-9]*\.[0-9][0-9]*\.[0-9]*|ndk;${ANDROID_NDK_PKG_ID}|g" "$script"
              echo "After patch:"
              grep -n "ndk;[0-9]" "$script"
            fi
          done

          # ── Also disable the ci_tarball line that encodes NDK version ──
          # The ci_tarball variable constructs a URL to download prebuilt deps
          # for the UPSTREAM NDK version. With our different NDK, that tarball
          # won't exist, so we must let the build compile deps from source.
          if grep -q "^ci_tarball=" "$DEPINFO"; then
            echo ""
            echo "Disabling ci_tarball (prebuilt cache tied to upstream NDK)..."
            sed -i 's/^ci_tarball=/#ci_tarball=/' "$DEPINFO"
            echo "ci_tarball disabled — deps will be built from source"
          fi

          echo ""
          echo "=== Patched depinfo.sh NDK config ==="
          grep -n "v_ndk\|ndkver\|ndk_ver\|ci_tarball" "$DEPINFO" || true
          echo ""
          echo "✓ NDK patched to ${ANDROID_NDK_VERSION} (${ANDROID_NDK_PKG_ID})"

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: mpv-android/buildscripts/sdk
          key: android-sdk-ndk-${{ runner.os }}-${{ env.ANDROID_NDK_PKG_ID }}-${{ hashFiles('config/versions.env') }}
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-${{ env.ANDROID_NDK_PKG_ID }}-
            android-sdk-ndk-${{ runner.os }}-

      - name: Download sources and SDK
        working-directory: mpv-android/buildscripts
        run: |
          set -euo pipefail
          echo "=== NDK config in depinfo.sh ==="
          grep "v_ndk\|ndkver" include/depinfo.sh || true
          echo ""

          ./download.sh

      # ──────────────────────────────────────────────────────
      # download.sh installs its own apt packages including
      # meson 0.61.2 from Ubuntu repos, which shadows our
      # pip-installed meson 1.11.x. Re-assert pip versions.
      # ──────────────────────────────────────────────────────
      - name: Re-assert modern meson after download.sh
        run: |
          set -euo pipefail

          echo "=== Meson version BEFORE fix ==="
          which meson
          meson --version

          # Remove apt-installed meson/ninja that download.sh pulled in
          sudo apt-get remove -y meson ninja-build 2>/dev/null || true

          # Ensure pip versions are on PATH and take priority
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          # Reinstall if somehow removed
          python3 -m pip install --upgrade meson ninja

          echo ""
          echo "=== Meson version AFTER fix ==="
          which meson
          meson --version
          which ninja
          ninja --version

          # Hard fail if meson is still old
          MESON_VER=$(meson --version)
          MESON_MAJOR=$(echo "$MESON_VER" | cut -d. -f1)
          MESON_MINOR=$(echo "$MESON_VER" | cut -d. -f2)
          if [ "$MESON_MAJOR" -eq 0 ] || { [ "$MESON_MAJOR" -eq 1 ] && [ "$MESON_MINOR" -lt 6 ]; }; then
            echo "FATAL: meson ${MESON_VER} is too old! fontconfig requires >= 1.6.1"
            exit 1
          fi
          echo "✓ meson ${MESON_VER} is new enough"

      # ──────────────────────────────────────────────────────
      # Verify the NDK that download.sh installed matches
      # what we requested in versions.env.
      # ──────────────────────────────────────────────────────
      - name: Verify NDK version matches versions.env
        working-directory: mpv-android/buildscripts
        run: |
          set -euo pipefail

          echo "=== Post-download NDK Verification ==="
          echo ""

          # List all NDKs found in sdk/
          echo "All NDK installations found:"
          find sdk/ -name "source.properties" 2>/dev/null | while read -r props; do
            rev=$(grep "^Pkg.Revision" "$props" | cut -d= -f2 | tr -d ' ')
            echo "  $props → Pkg.Revision=$rev"
          done
          echo ""

          # Find the NDK that the build will use
          ACTUAL_NDK_DIR=""

          # mpv-android typically installs to sdk/android-ndk-rXX/
          if [ -d "sdk/android-ndk-${ANDROID_NDK_VERSION}" ]; then
            ACTUAL_NDK_DIR="sdk/android-ndk-${ANDROID_NDK_VERSION}"
          fi

          # Or it might use the side-by-side layout: sdk/ndk/VERSION/
          if [ -z "$ACTUAL_NDK_DIR" ]; then
            ACTUAL_NDK_DIR=$(find sdk/ -maxdepth 3 -name "source.properties" \
              -exec grep -l "Pkg.Revision = ${ANDROID_NDK_PKG_ID}" {} \; 2>/dev/null \
              | head -1 | xargs -r dirname)
          fi

          # Last resort: find any NDK
          if [ -z "$ACTUAL_NDK_DIR" ]; then
            ACTUAL_NDK_DIR=$(find sdk/ -name "source.properties" -exec grep -l "^Pkg.Revision" {} \; \
              2>/dev/null | head -1 | xargs -r dirname)
          fi

          if [ -z "$ACTUAL_NDK_DIR" ] || [ ! -f "${ACTUAL_NDK_DIR}/source.properties" ]; then
            echo "FATAL: No NDK found in sdk/ after download.sh!"
            echo "SDK contents:"
            ls -la sdk/ 2>/dev/null || echo "(sdk/ missing)"
            find sdk/ -maxdepth 3 -type d 2>/dev/null || true
            exit 1
          fi

          ACTUAL_REV=$(grep "^Pkg.Revision" "${ACTUAL_NDK_DIR}/source.properties" | cut -d= -f2 | tr -d ' ')

          echo "Expected : ${ANDROID_NDK_VERSION} (${ANDROID_NDK_PKG_ID})"
          echo "Actual   : ${ACTUAL_NDK_DIR} (${ACTUAL_REV})"
          echo ""

          if [ "$ACTUAL_REV" != "$ANDROID_NDK_PKG_ID" ]; then
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  FATAL: NDK VERSION MISMATCH!                          ║"
            echo "║                                                        ║"
            echo "║  Expected: ${ANDROID_NDK_PKG_ID} (${ANDROID_NDK_VERSION})"
            echo "║  Got     : ${ACTUAL_REV}"
            echo "║                                                        ║"
            echo "║  The depinfo.sh patch did not fully take effect.       ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            echo ""
            echo "Current depinfo.sh:"
            grep "v_ndk\|ndkver" include/depinfo.sh || true
            echo ""
            echo "Current download-sdk.sh:"
            grep "ndk" include/download-sdk.sh 2>/dev/null || true
            exit 1
          fi

          echo "✓ NDK ${ANDROID_NDK_VERSION} (${ANDROID_NDK_PKG_ID}) confirmed!"

          NDK_PATH="$(cd "${ACTUAL_NDK_DIR}" && pwd)"
          echo "NDK_PATH=${NDK_PATH}" >> "$GITHUB_ENV"
          echo "NDK_PATH=${NDK_PATH}"

      - name: Build for ${{ matrix.arch }}
        working-directory: mpv-android/buildscripts
        env:
          ANDROID_STL: ${{ env.ANDROID_STL }}
        run: |
          set -euo pipefail
          echo "Using meson : $(which meson) ($(meson --version))"
          echo "Using NDK   : ${NDK_PATH}"

          # Show the clang that will be used
          CLANG=$(find "${NDK_PATH}" -name "aarch64-linux-android*-clang" -type f | head -1)
          if [ -n "$CLANG" ]; then
            echo "Clang       : $CLANG"
            "$CLANG" --version 2>&1 | head -2 || true
          fi

          ./buildall.sh --arch ${{ matrix.arch }} --clean mpv

      - name: Verify built libraries use correct NDK
        run: |
          set -euo pipefail
          echo "=== Post-build Library Verification ==="

          LIBMPV=$(find mpv-android/buildscripts -name "libmpv.so" -type f | head -1)
          if [ -z "$LIBMPV" ]; then
            echo "WARNING: libmpv.so not found yet (will check during packaging)"
          else
            echo "Found: $LIBMPV"
            echo ""
            echo "Dependencies:"
            readelf -d "$LIBMPV" | grep NEEDED || true
            echo ""

            # Check for the symbol that caused the original crash
            if nm -D "$LIBMPV" 2>/dev/null | grep -q "__from_chars_floating_point"; then
              echo "⚠ WARNING: libmpv.so references __from_chars_floating_point"
              echo "  This symbol requires a newer libc++_shared.so"
              echo "  If your Qt uses an older NDK, this WILL crash at runtime!"
            else
              echo "✓ No __from_chars_floating_point — safe for Qt NDK r27c libc++"
            fi
          fi

      - name: Package
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"
          ABI="${{ matrix.abi }}"
          PREFIX="mpv-android/buildscripts/prefix/${ARCH}"
          DEPS_DIR="mpv-android/buildscripts/deps"
          NDK_VER="${ANDROID_NDK_VERSION}"

          case "$ABI" in
            arm64-v8a)
              NDK_TRIPLE="aarch64-linux-android"
              NDK_ABI_DIR="aarch64"
              ;;
            armeabi-v7a)
              NDK_TRIPLE="arm-linux-androideabi"
              NDK_ABI_DIR="arm"
              ;;
            x86_64)
              NDK_TRIPLE="x86_64-linux-android"
              NDK_ABI_DIR="x86_64"
              ;;
            x86)
              NDK_TRIPLE="i686-linux-android"
              NDK_ABI_DIR="i686"
              ;;
            *)
              echo "FATAL: Unsupported ABI: $ABI"
              exit 1
              ;;
          esac

          mkdir -p package/lib package/include/mpv

          # ── Collect .so files ──
          if [ -d "${PREFIX}/lib" ]; then
            find "${PREFIX}/lib" -maxdepth 1 -name '*.so' -exec cp {} package/lib/ \;
          fi

          if [ ! -f "package/lib/libmpv.so" ]; then
            echo "WARNING: libmpv.so not in prefix, searching deps..."
            find "${DEPS_DIR}" -name 'libmpv.so' -type f 2>/dev/null | while read -r f; do
              echo "  Found: $f"
              cp "$f" package/lib/
            done
          fi

          if [ ! -f "package/lib/libavcodec.so" ]; then
            for dep_dir in "${DEPS_DIR}"/*/lib; do
              [ -d "$dep_dir" ] && find "$dep_dir" -maxdepth 1 -name '*.so' -exec cp -n {} package/lib/ \;
            done
          fi

          # ── Collect libc++_shared.so from the VERIFIED NDK ──
          echo ""
          echo "=== Including libc++_shared.so from NDK ${NDK_VER} ==="

          NDK_LIBC_PATHS=(
            "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${NDK_TRIPLE}/libc++_shared.so"
            "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang/*/lib/linux/${NDK_ABI_DIR}/libc++_shared.so"
          )

          FOUND_LIBC=0
          for pattern in "${NDK_LIBC_PATHS[@]}"; do
            for libc_path in $pattern; do
              if [ -f "$libc_path" ]; then
                echo "  Found: $libc_path"
                cp "$libc_path" package/lib/
                FOUND_LIBC=1
                break 2
              fi
            done
          done

          if [ $FOUND_LIBC -eq 0 ]; then
            echo "  Searching entire NDK for libc++_shared.so..."
            LIBC_PATH=$(find "${NDK_PATH}" -name "libc++_shared.so" \
              -path "*/${NDK_TRIPLE}/*" -type f | head -1)
            if [ -n "$LIBC_PATH" ]; then
              echo "  Found: $LIBC_PATH"
              cp "$LIBC_PATH" package/lib/
              FOUND_LIBC=1
            fi
          fi

          if [ $FOUND_LIBC -eq 0 ]; then
            echo "FATAL: libc++_shared.so not found in NDK!"
            find "${NDK_PATH}" -name 'libc++_shared.so' -type f 2>/dev/null | head -10 || true
            exit 1
          fi

          # ── Collect headers ──
          if [ -d "${PREFIX}/include/mpv" ]; then
            cp "${PREFIX}/include/mpv"/*.h package/include/mpv/
          fi

          if [ ! -f "package/include/mpv/client.h" ]; then
            echo "WARNING: Headers not in prefix, searching source tree..."
            MPV_INCLUDE=$(find "${DEPS_DIR}" -type d -name "mpv" -path "*/include/mpv" | head -1)
            if [ -n "$MPV_INCLUDE" ]; then
              cp "${MPV_INCLUDE}"/*.h package/include/mpv/
            fi
          fi

          if [ ! -f "package/include/mpv/client.h" ]; then
            echo "WARNING: Downloading headers from mpv repo..."
            for hdr in client.h render.h render_gl.h stream_cb.h; do
              curl -sL "https://raw.githubusercontent.com/mpv-player/mpv/master/libmpv/${hdr}" \
                -o "package/include/mpv/${hdr}" || true
            done
          fi

          # ── BUILD_INFO metadata (verified) ──
          mkdir -p package/META-INF
          {
            echo "libmpv-android Build Information"
            echo "================================"
            echo ""
            echo "Build Date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Release Version: $RELEASE_VERSION"
            echo "Target ABI: ${ABI}"
            echo "Target Architecture: ${ARCH}"
            echo ""
            echo "C++ Runtime Configuration (VERIFIED)"
            echo "====================================="
            echo "NDK Version: $ANDROID_NDK_VERSION"
            echo "NDK Pkg.Revision: $ANDROID_NDK_PKG_ID"
            echo "NDK Path: ${NDK_PATH}"
            echo "C++ Standard Library: $ANDROID_STL"
            echo "STL Mode: SHARED (libc++_shared.so included)"
            echo ""
            echo "NOTE: depinfo.sh was patched to enforce NDK ${ANDROID_NDK_VERSION}."
            echo "Both v_ndk and v_ndk_n were overridden before download.sh ran."
            echo "The NDK version was verified after download and after build."
            echo ""
            echo "COMPATIBILITY"
            echo "============="
            echo "- Built with NDK $ANDROID_NDK_VERSION ($ANDROID_NDK_PKG_ID)"
            echo "- All native libs in your app must use the same libc++_shared.so"
            echo "- For Qt apps: ensure Qt was also built with NDK $ANDROID_NDK_VERSION"
          } > package/META-INF/BUILD_INFO.txt

          cat package/META-INF/BUILD_INFO.txt

          # ── Validate ──
          echo ""
          echo "=== Validating package ==="
          if [ ! -f "package/lib/libmpv.so" ]; then
            echo "FATAL: libmpv.so not found!"
            find mpv-android/buildscripts -name 'libmpv*' -type f 2>/dev/null
            exit 1
          fi

          REQUIRED_HEADERS=(client.h render.h render_gl.h)
          for hdr in "${REQUIRED_HEADERS[@]}"; do
            if [ ! -f "package/include/mpv/$hdr" ]; then
              echo "FATAL: Missing required header: $hdr"
              exit 1
            fi
          done

          echo ""
          echo "=== Architecture check ==="
          file package/lib/libmpv.so
          readelf -h package/lib/libmpv.so | grep -E "(Class|Machine)"

          echo ""
          echo "=== All libraries ==="
          ls -lh package/lib/

          echo ""
          echo "=== Headers ==="
          ls -lh package/include/mpv/

          cp NOTICE.md package/ 2>/dev/null || echo "INFO: NOTICE.md not found, skipping."

          cd package
          find . -print0 | sort -z | \
            tar --create --null --files-from=- \
                --owner=0 --group=0 --mtime='2024-01-01 00:00:00Z' \
                --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            | gzip -9n > "../libmpv-android-${ABI}.tar.gz"

          echo ""
          echo "=== Final archive ==="
          ls -lh "../libmpv-android-${ABI}.tar.gz"
          sha256sum "../libmpv-android-${ABI}.tar.gz"
          tar -tzf "../libmpv-android-${ABI}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: libmpv-android-${{ matrix.abi }}
          path: libmpv-android-${{ matrix.abi }}.tar.gz
          retention-days: 5
          if-no-files-found: error