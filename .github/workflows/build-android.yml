name: Build Android

on:
  workflow_dispatch:
  workflow_call:

jobs:
  android:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            abi: arm64-v8a
          - arch: armv7l
            abi: armeabi-v7a
          - arch: x86_64
            abi: x86_64
          - arch: x86
            abi: x86

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          set -euo pipefail
          set -a
          source config/versions.env
          set +a

          # Validate required variables
          : "${MPV_ANDROID_REPO:?MPV_ANDROID_REPO not set in versions.env}"
          : "${MPV_ANDROID_REF:?MPV_ANDROID_REF not set in versions.env}"
          : "${RELEASE_VERSION:?RELEASE_VERSION not set in versions.env}"
          : "${ANDROID_NDK_VERSION:?ANDROID_NDK_VERSION not set in versions.env}"
          : "${ANDROID_STL:?ANDROID_STL not set in versions.env}"

          echo "MPV_ANDROID_REPO=$MPV_ANDROID_REPO" >> "$GITHUB_ENV"
          echo "MPV_ANDROID_REF=$MPV_ANDROID_REF" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_VERSION=$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_STL=$ANDROID_STL" >> "$GITHUB_ENV"

      - name: Free disk space
        run: |
          set -euo pipefail
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache /usr/local/share/boost \
            /usr/local/graalvm /usr/local/.ghcup
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java version
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      # ──────────────────────────────────────────────────────
      # FIX: fontconfig now requires meson >= 1.6.1.
      # Ubuntu 22.04 ships meson 0.61.2.
      # Install modern meson via pip BEFORE apt meson,
      # then remove the apt one so the pip version wins.
      # ──────────────────────────────────────────────────────
      - name: Install modern meson and ninja via pip
        run: |
          set -euo pipefail

          # Remove outdated system meson/ninja if present
          sudo apt-get remove -y meson ninja-build 2>/dev/null || true

          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade meson ninja

          # Persist PATH so all future steps find pip-installed binaries
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          # Verify
          echo "meson: $(meson --version)"
          echo "ninja: $(ninja --version)"
          echo "meson path: $(which meson)"

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config \
            python3 python3-pip python3-setuptools python3-jsonschema \
            nasm wget unzip git
          # NOTE: meson and ninja are NOT installed from apt — we use pip versions

      - name: Clone mpv-android
        run: |
          set -euo pipefail
          git clone --depth 1 --recurse-submodules --branch "$MPV_ANDROID_REF" \
            "https://github.com/${MPV_ANDROID_REPO}.git" mpv-android

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: mpv-android/buildscripts/sdk
          key: android-sdk-ndk-${{ runner.os }}-${{ hashFiles('config/versions.env') }}
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-

      - name: Download sources and SDK
        working-directory: mpv-android/buildscripts
        run: |
          set -euo pipefail
          echo "Using meson: $(which meson) ($(meson --version))"
          java -version 2>&1 | head -1
          ./download.sh

      - name: Build for ${{ matrix.arch }}
        working-directory: mpv-android/buildscripts
        env:
          ANDROID_STL: ${{ env.ANDROID_STL }}
        run: |
          set -euo pipefail
          echo "Using meson: $(which meson) ($(meson --version))"

          # Always pass --arch explicitly to avoid relying on unknown defaults
          ./buildall.sh --arch ${{ matrix.arch }} --clean mpv

      - name: Package
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"
          ABI="${{ matrix.abi }}"
          PREFIX="mpv-android/buildscripts/prefix/${ARCH}"
          DEPS_DIR="mpv-android/buildscripts/deps"
          case "$ABI" in
            arm64-v8a)
              NDK_TRIPLE="aarch64-linux-android"
              NDK_ABI_DIR="aarch64"
              ;;
            armeabi-v7a)
              NDK_TRIPLE="arm-linux-androideabi"
              NDK_ABI_DIR="arm"
              ;;
            x86_64)
              NDK_TRIPLE="x86_64-linux-android"
              NDK_ABI_DIR="x86_64"
              ;;
            x86)
              NDK_TRIPLE="i686-linux-android"
              NDK_ABI_DIR="i686"
              ;;
            *)
              echo "FATAL: Unsupported ABI for NDK runtime lookup: $ABI"
              exit 1
              ;;
          esac

          mkdir -p package/lib package/include/mpv

          # ── Collect .so files ──
          if [ -d "${PREFIX}/lib" ]; then
            find "${PREFIX}/lib" -maxdepth 1 -name '*.so' -exec cp {} package/lib/ \;
          fi

          # Fallback: search deps build output
          if [ ! -f "package/lib/libmpv.so" ]; then
            echo "WARNING: libmpv.so not in prefix, searching deps..."
            find "${DEPS_DIR}" -name 'libmpv.so' -type f 2>/dev/null | while read -r f; do
              echo "  Found: $f"
              cp "$f" package/lib/
            done
          fi

          # Grab dependency .so files from deps subdirs
          if [ ! -f "package/lib/libavcodec.so" ]; then
            for dep_dir in "${DEPS_DIR}"/*/lib; do
              [ -d "$dep_dir" ] && find "$dep_dir" -maxdepth 1 -name '*.so' -exec cp -n {} package/lib/ \;
            done
          fi

          # ── CRITICAL: Collect libc++_shared.so from NDK ──
          echo ""
          echo "=== Including matching libc++_shared.so ==="
          NDK_LIBC_PATHS=(
            "mpv-android/buildscripts/sdk/ndk-bundle/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${NDK_TRIPLE}/libc++_shared.so"
            "mpv-android/buildscripts/sdk/ndk-bundle/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang/*/lib/linux/${NDK_ABI_DIR}/libc++_shared.so"
            "mpv-android/buildscripts/sdk/ndk/*/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${NDK_TRIPLE}/libc++_shared.so"
            "mpv-android/buildscripts/sdk/ndk/*/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang/*/lib/linux/${NDK_ABI_DIR}/libc++_shared.so"
            "mpv-android/buildscripts/sdk/android-ndk-*/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${NDK_TRIPLE}/libc++_shared.so"
            "mpv-android/buildscripts/sdk/android-ndk-*/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang/*/lib/linux/${NDK_ABI_DIR}/libc++_shared.so"
          )

          FOUND_LIBC=0
          for pattern in "${NDK_LIBC_PATHS[@]}"; do
            for libc_path in $pattern; do
              if [ -f "$libc_path" ]; then
                echo "  Found libc++_shared.so: $libc_path"
                cp "$libc_path" package/lib/
                FOUND_LIBC=1
                break 2
              fi
            done
          done

          if [ $FOUND_LIBC -eq 0 ]; then
            echo "  WARNING: libc++_shared.so not found in NDK paths for ABI $ABI ($NDK_ABI_DIR)"
            echo "  Searched patterns:"
            for pattern in "${NDK_LIBC_PATHS[@]}"; do
              echo "    - $pattern"
            done
            echo "  Available NDK structure:"
            if [ -d "mpv-android/buildscripts/sdk" ]; then
              find mpv-android/buildscripts/sdk -name 'libc++_shared.so' -type f 2>/dev/null | head -5 || true
            fi
            echo ""
            echo "  FATAL: This package must include libc++_shared.so to be usable by downstream apps"
            exit 1
          fi

          # ── Collect headers ──
          if [ -d "${PREFIX}/include/mpv" ]; then
            cp "${PREFIX}/include/mpv"/*.h package/include/mpv/
          fi

          if [ ! -f "package/include/mpv/client.h" ]; then
            echo "WARNING: Headers not in prefix, searching source tree..."
            MPV_INCLUDE=$(find "${DEPS_DIR}" -type d -name "mpv" -path "*/include/mpv" | head -1)
            if [ -n "$MPV_INCLUDE" ]; then
              cp "${MPV_INCLUDE}"/*.h package/include/mpv/
            fi
          fi

          # Last resort: download headers
          if [ ! -f "package/include/mpv/client.h" ]; then
            echo "WARNING: Downloading headers from mpv repo..."
            for hdr in client.h render.h render_gl.h stream_cb.h; do
              curl -sL "https://raw.githubusercontent.com/mpv-player/mpv/master/libmpv/${hdr}" \
                -o "package/include/mpv/${hdr}" || true
            done
          fi

          # ── Create BUILD_INFO metadata ──
          mkdir -p package/META-INF
          {
            echo "libmpv-android Build Information"
            echo "================================"
            echo ""
            echo "Build Date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Release Version: $RELEASE_VERSION"
            echo "Target ABI: ${ABI}"
            echo "Target Architecture: ${ARCH}"
            echo ""
            echo "C++ Runtime Configuration"
            echo "========================="
            echo "NDK Version: $ANDROID_NDK_VERSION"
            echo "C++ Standard Library: $ANDROID_STL"
            echo "STL Mode: SHARED (libc++_shared.so included in package)"
            echo ""
            echo "CRITICAL COMPATIBILITY NOTES"
            echo "============================"
            echo "- This library is built with NDK $ANDROID_NDK_VERSION using c++_shared"
            echo "- libc++_shared.so is REQUIRED and should be included in your APK"
            echo "- Consumers must ship the included libc++_shared.so with their app"
            echo "- Using a different libc++ at runtime will cause UnsatisfiedLinkError"
            echo ""
            echo "For Qt/Android Integration"
            echo "==========================="
            echo "1. Extract this archive to your Qt project: libs/android/${ABI}/"
            echo "2. Ensure libc++_shared.so is present in libs/android/${ABI}/"
            echo "3. Qt Creator should automatically include .so files in the APK"
            echo "4. Test on device to verify no UnsatisfiedLinkError crashes"
            echo ""
            echo "For Non-Qt Android Apps"
            echo "======================="
            echo "1. Copy .so files to app/src/main/jniLibs/${ABI}/"
            echo "2. Copy libc++_shared.so to the same directory"
            echo "3. Build and deploy via Gradle"
            echo "4. Verify on device"
          } > package/META-INF/BUILD_INFO.txt

          cat package/META-INF/BUILD_INFO.txt

          # ── Validate ──
          echo ""
          echo "=== Validating package ==="
          if [ ! -f "package/lib/libmpv.so" ]; then
            echo "FATAL: libmpv.so not found!"
            find mpv-android/buildscripts -name 'libmpv*' -type f 2>/dev/null
            exit 1
          fi

          REQUIRED_HEADERS=(client.h render.h render_gl.h)
          for hdr in "${REQUIRED_HEADERS[@]}"; do
            if [ ! -f "package/include/mpv/$hdr" ]; then
              echo "FATAL: Missing required header: $hdr"
              exit 1
            fi
          done

          echo ""
          echo "=== Architecture check ==="
          file package/lib/libmpv.so
          readelf -h package/lib/libmpv.so | grep -E "(Class|Machine)"

          echo ""
          echo "=== All libraries ==="
          ls -lh package/lib/

          echo ""
          echo "=== Headers ==="
          ls -lh package/include/mpv/

          echo ""
          echo "=== Build metadata ==="
          ls -lh package/META-INF/

          cp NOTICE.md package/ 2>/dev/null || echo "INFO: NOTICE.md not found in repo root, skipping."

          cd package
          find . -print0 | sort -z | \
            tar --create --null --files-from=- \
                --owner=0 --group=0 --mtime='2024-01-01 00:00:00Z' \
                --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            | gzip -9n > "../libmpv-android-${ABI}.tar.gz"

          echo ""
          echo "=== Final archive ==="
          ls -lh "../libmpv-android-${ABI}.tar.gz"
          sha256sum "../libmpv-android-${ABI}.tar.gz"
          echo ""
          tar -tzf "../libmpv-android-${ABI}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: libmpv-android-${{ matrix.abi }}
          path: libmpv-android-${{ matrix.abi }}.tar.gz
          retention-days: 5
          if-no-files-found: error