name: Fetch Windows

on:
  workflow_dispatch:
  workflow_call:

jobs:
  windows:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            dev_pattern: "mpv-dev-x86_64-"
            exclude_patterns: "-v3-,-gcc-"
          - arch: aarch64
            dev_pattern: "mpv-dev-aarch64-"
            exclude_patterns: "-gcc-"

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          set -a; source config/versions.env; set +a
          echo "SHINCHIRO_REPO=$SHINCHIRO_REPO" >> "$GITHUB_ENV"
          echo "SHINCHIRO_TAG=$SHINCHIRO_TAG" >> "$GITHUB_ENV"

      # ──────────────────────────────────────────────────────
      # Install 7-Zip with multiple fallbacks.
      # We need >= 23.01 to decompress shinchiro's LZMA2:96m.
      #
      # Strategy:
      #   1. Try apt (7zip or p7zip-full)
      #   2. Check if binary works and is new enough
      #   3. If not, download from ip7z/7zip GitHub releases
      #   4. Export working binary name as SEVENZIP env var
      # ──────────────────────────────────────────────────────
      - name: Install modern 7-Zip
        run: |
          set -euo pipefail

          find_7z_binary() {
            for bin in 7zz 7z; do
              if command -v "$bin" &>/dev/null; then
                echo "$bin"
                return 0
              fi
            done
            return 1
          }

          check_version_ok() {
            local bin="\$1"
            # Extract version number, need >= 23.01
            local ver
            ver=$("$bin" --help 2>&1 | head -3 | grep -oP '\d+\.\d+' | head -1 || true)
            if [ -z "$ver" ]; then
              ver=$("$bin" 2>&1 | head -3 | grep -oP '\d+\.\d+' | head -1 || true)
            fi
            echo "  Found $bin version: $ver"
            if [ -z "$ver" ]; then
              return 1
            fi
            local major minor
            major=$(echo "$ver" | cut -d. -f1)
            minor=$(echo "$ver" | cut -d. -f2)
            if [ "$major" -ge 24 ] || ([ "$major" -eq 23 ] && [ "$minor" -ge 1 ]); then
              return 0
            fi
            echo "  Version $ver is too old (need >= 23.01)"
            return 1
          }

          SEVENZIP=""

          # ── Attempt 1: apt install ──
          echo "=== Attempt 1: apt install ==="
          sudo apt-get update -qq
          sudo apt-get install -y 7zip 2>/dev/null || \
          sudo apt-get install -y p7zip-full 2>/dev/null || true

          if BIN=$(find_7z_binary); then
            if check_version_ok "$BIN"; then
              SEVENZIP="$BIN"
              echo "  ✓ Using apt-installed $BIN"
            fi
          fi

          # ── Attempt 2: Download from ip7z/7zip GitHub releases ──
          if [ -z "$SEVENZIP" ]; then
            echo ""
            echo "=== Attempt 2: Download from GitHub (ip7z/7zip) ==="
            DOWNLOAD_URL="https://github.com/ip7z/7zip/releases/download/24.09/7z2409-linux-x64.tar.xz"
            echo "  Downloading: $DOWNLOAD_URL"
            if curl -L --fail --silent --show-error -o /tmp/7z.tar.xz "$DOWNLOAD_URL"; then
              sudo mkdir -p /opt/7zip
              sudo tar -xf /tmp/7z.tar.xz -C /opt/7zip
              rm -f /tmp/7z.tar.xz
              if [ -f /opt/7zip/7zz ]; then
                sudo chmod +x /opt/7zip/7zz
                sudo ln -sf /opt/7zip/7zz /usr/local/bin/7zz
                SEVENZIP="7zz"
                echo "  ✓ Downloaded and installed 7zz from GitHub"
              fi
            else
              echo "  ✗ GitHub download failed, trying alternative URL..."
              # Try older release
              DOWNLOAD_URL="https://github.com/ip7z/7zip/releases/download/24.08/7z2408-linux-x64.tar.xz"
              if curl -L --fail --silent --show-error -o /tmp/7z.tar.xz "$DOWNLOAD_URL"; then
                sudo mkdir -p /opt/7zip
                sudo tar -xf /tmp/7z.tar.xz -C /opt/7zip
                rm -f /tmp/7z.tar.xz
                if [ -f /opt/7zip/7zz ]; then
                  sudo chmod +x /opt/7zip/7zz
                  sudo ln -sf /opt/7zip/7zz /usr/local/bin/7zz
                  SEVENZIP="7zz"
                  echo "  ✓ Downloaded and installed 7zz (24.08) from GitHub"
                fi
              fi
            fi
          fi

          # ── Attempt 3: Download static binary from 7-zip.org via curl ──
          if [ -z "$SEVENZIP" ]; then
            echo ""
            echo "=== Attempt 3: Download from 7-zip.org ==="
            if curl -L --fail --silent --show-error -o /tmp/7z.tar.xz \
              "https://www.7-zip.org/a/7z2408-linux-x64.tar.xz"; then
              sudo mkdir -p /opt/7zip
              sudo tar -xf /tmp/7z.tar.xz -C /opt/7zip
              rm -f /tmp/7z.tar.xz
              if [ -f /opt/7zip/7zz ]; then
                sudo chmod +x /opt/7zip/7zz
                sudo ln -sf /opt/7zip/7zz /usr/local/bin/7zz
                SEVENZIP="7zz"
                echo "  ✓ Downloaded from 7-zip.org"
              fi
            else
              echo "  ✗ 7-zip.org download also failed"
            fi
          fi

          # ── Final check ──
          if [ -z "$SEVENZIP" ]; then
            echo ""
            echo "FATAL: Could not install a working 7-Zip >= 23.01"
            echo "Tried: apt, GitHub releases, 7-zip.org"
            exit 1
          fi

          echo ""
          echo "=== Final 7-Zip setup ==="
          echo "Binary: $SEVENZIP ($(which "$SEVENZIP"))"
          "$SEVENZIP" --help 2>&1 | head -2 || "$SEVENZIP" 2>&1 | head -2 || true
          echo "SEVENZIP=$SEVENZIP" >> "$GITHUB_ENV"

      - name: Download shinchiro dev build
        run: |
          set -euo pipefail

          if [ "$SHINCHIRO_TAG" = "latest" ]; then
            API_URL="https://api.github.com/repos/${SHINCHIRO_REPO}/releases/latest"
          else
            API_URL="https://api.github.com/repos/${SHINCHIRO_REPO}/releases/tags/${SHINCHIRO_TAG}"
          fi

          echo "Fetching release info from: $API_URL"
          RELEASE_JSON=$(curl -sS -H "Accept: application/vnd.github+json" "$API_URL")

          DEV_URL=$(echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          pattern = '${{ matrix.dev_pattern }}'
          excludes = '${{ matrix.exclude_patterns }}'.split(',')
          for asset in data.get('assets', []):
              name = asset['name']
              if not name.startswith(pattern):
                  continue
              if not name.endswith('.7z'):
                  continue
              skip = False
              for excl in excludes:
                  excl = excl.strip()
                  if excl and excl in name:
                      skip = True
                      break
              if skip:
                  continue
              print(asset['browser_download_url'])
              break
          " || true)

          if [ -z "$DEV_URL" ]; then
            echo "FATAL: Could not find dev package matching '${{ matrix.dev_pattern }}'"
            echo ""
            echo "Available assets:"
            echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              print(f\"  {a['name']}\")
          "
            exit 1
          fi

          echo "Downloading: $DEV_URL"
          curl -L --fail --progress-bar -o mpv-dev.7z "$DEV_URL"
          ls -lh mpv-dev.7z

          echo "$DEV_URL" > source-url.txt

          echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data.get('tag_name', 'unknown'))
          " > source-tag.txt

      - name: Extract and repackage
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"

          # Use whichever 7z binary was found
          echo "Extracting with: $SEVENZIP"
          $SEVENZIP x mpv-dev.7z -ompv-dev-raw

          echo "=== Raw extraction contents ==="
          find mpv-dev-raw -type f | sort

          CONTENT_ROOT=$(find mpv-dev-raw -name 'client.h' -printf '%h\n' | head -1)
          if [ -n "$CONTENT_ROOT" ]; then
            CONTENT_ROOT=$(echo "$CONTENT_ROOT" | sed 's|/include/mpv$||')
          else
            CONTENT_ROOT=$(find mpv-dev-raw -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -z "$CONTENT_ROOT" ]; then
              CONTENT_ROOT="mpv-dev-raw"
            fi
          fi

          echo "Content root: $CONTENT_ROOT"
          find "$CONTENT_ROOT" -type f | sort

          mkdir -p package/lib package/bin package/include/mpv

          # ── Headers ──
          if [ -d "$CONTENT_ROOT/include/mpv" ]; then
            cp "$CONTENT_ROOT/include/mpv"/*.h package/include/mpv/
          else
            find "$CONTENT_ROOT" -name '*.h' | while read -r hdr; do
              cp "$hdr" package/include/mpv/
            done
          fi

          # ── DLL ──
          find "$CONTENT_ROOT" -name 'libmpv-2.dll' -type f -exec cp {} package/bin/ \;
          if [ ! -f "package/bin/libmpv-2.dll" ]; then
            find "$CONTENT_ROOT" -name 'mpv-2.dll' -type f -exec cp {} package/bin/ \;
          fi

          # ── Import library ──
          find "$CONTENT_ROOT" -name 'libmpv.dll.a' -type f -exec cp {} package/lib/ \;
          find "$CONTENT_ROOT" -name 'mpv.lib' -type f -exec cp {} package/lib/ \; 2>/dev/null || true
          find "$CONTENT_ROOT" -name '*.def' -type f -exec cp {} package/lib/ \; 2>/dev/null || true

          # ── Validate ──
          echo ""
          echo "=== Validation ==="

          if [ ! -f "package/bin/libmpv-2.dll" ] && [ ! -f "package/bin/mpv-2.dll" ]; then
            echo "FATAL: No DLL found"
            find "$CONTENT_ROOT" -type f
            exit 1
          fi

          if [ ! -f "package/lib/libmpv.dll.a" ] && [ ! -f "package/lib/mpv.lib" ]; then
            echo "FATAL: No import library found"
            exit 1
          fi

          for hdr in client.h render.h render_gl.h; do
            if [ ! -f "package/include/mpv/$hdr" ]; then
              echo "FATAL: Missing header: $hdr"
              exit 1
            fi
          done

          echo "DLL:"; ls -lh package/bin/
          echo "Import lib:"; ls -lh package/lib/
          echo "Headers:"; ls -lh package/include/mpv/

          cp source-url.txt package/
          cp source-tag.txt package/ 2>/dev/null || true
          cp NOTICE.md package/ 2>/dev/null || true

          cd package
          find . -print0 | sort -z | \
            tar --create --null --files-from=- \
                --owner=0 --group=0 --mtime='2024-01-01 00:00:00Z' \
                --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            | gzip -9n > "../libmpv-windows-${ARCH}.tar.gz"

          echo ""
          ls -lh "../libmpv-windows-${ARCH}.tar.gz"
          sha256sum "../libmpv-windows-${ARCH}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: libmpv-windows-${{ matrix.arch }}
          path: libmpv-windows-${{ matrix.arch }}.tar.gz
          retention-days: 5
          if-no-files-found: error